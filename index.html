<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>우리반 자리 룰렛</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f0f4ff;
}

h1{
margin-top:20px;
}

.board{
font-size:25px;
font-weight:bold;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:center;
margin:8px;
}

.seat{
width:90px;
height:45px;
border:2px solid #333;
margin:4px;
display:flex;
align-items:center;
justify-content:center;
background:white;
font-size:14px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}
</style>

</head>
<body>

<h1>🎰 우리반 자리 룰렛</h1>

<div class="board">칠판</div>

<div id="classroom"></div>

<button onclick="startRoulette()">START</button>
<button onclick="stopRoulette()">STOP</button>

<script>

const students = [
"학생1","학생2","학생3","학생4","학생5","학생6","학생7","학생8","학생9",
"학생10","학생11","학생12","학생13","학생14","학생15","학생16","학생17",
"학생18","학생19","학생20","학생21","학생22","학생23","학생24","학생25",
"학생26","학생27"
];

const layout = [5,6,5,6,5];

const classroom = document.getElementById("classroom");

let seats = [];
let interval;

function createSeats(){

layout.forEach(num=>{
const row = document.createElement("div");
row.className="row";

for(let i=0;i<num;i++){

const seat=document.createElement("div");
seat.className="seat";
seat.innerText="?";

row.appendChild(seat);
seats.push(seat);

}

classroom.appendChild(row);
});

}

createSeats();

function startRoulette(){

interval=setInterval(()=>{

seats.forEach(seat=>{

const rand=Math.floor(Math.random()*students.length);
seat.innerText=students[rand];

});

},100);

}

function stopRoulette(){

clearInterval(interval);

let shuffled=[...students];

for(let i=shuffled.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
}

seats.forEach((seat,i)=>{
seat.innerText=shuffled[i];
});

}

</script>

</body>
</html>
