<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>우리반 룰렛</title>

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:sans-serif;
text-align:center;
color:white;
}

h1{
margin-top:40px;
}

#roulette{
font-size:50px;
margin:40px;
height:60px;
}

button{
font-size:25px;
padding:15px 40px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎰 우리반 룰렛</h1>

<div id="roulette">START</div>

<button onclick="spin()">시작</button>

<script>

let students=[

"1번",
"2번",
"3번",
"4번",
"5번",
"6번",
"7번",
"8번",
"9번",
"10번",
"11번",
"12번",
"13번",
"14번",
"15번",
"16번",
"17번",
"18번",
"19번",
"20번",
"21번",
"22번",
"23번",
"24번",
"25번",
"26번",
"27번"

]

function spin(){

let count=0

let interval=setInterval(function(){

let random=Math.floor(Math.random()*students.length)

document.getElementById("roulette").innerText=students[random]

count++

if(count>50){
clearInterval(interval)
}

},70)

}

</script>

</body>
</html>
