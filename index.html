<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>자리 룰렛</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

.row{
display:flex;
justify-content:center;
margin:8px;
}

.seat{
width:60px;
height:35px;
border:2px solid black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
}

button{
margin:15px;
padding:8px 20px;
font-size:16px;
}

</style>
</head>

<body>

<div id="classroom"></div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>

const students=[
"학생1","학생2","학생3","학생4","학생5","학생6","학생7","학생8","학생9",
"학생10","학생11","학생12","학생13","학생14","학생15","학생16","학생17",
"학생18","학생19","학생20","학생21","학생22","학생23","학생24","학생25",
"학생26","학생27"
];

const layout=[5,6,5,6,5];

const classroom=document.getElementById("classroom");

let seats=[];
let interval;

// 위 5줄

layout.forEach(num=>{

const row=document.createElement("div");
row.className="row";

for(let i=0;i<num;i++){

const seat=document.createElement("div");
seat.className="seat";
seat.innerText="?";

row.appendChild(seat);
seats.push(seat);

}

classroom.appendChild(row);

});

// 마지막 줄 (2자리만)

const lastRow=document.createElement("div");
lastRow.className="row";

for(let i=0;i<2;i++){

const seat=document.createElement("div");
seat.className="seat";
seat.innerText="?";

lastRow.appendChild(seat);
seats.push(seat);

}

classroom.appendChild(lastRow);


// START

function start(){

interval=setInterval(()=>{

for(let seat of seats){

seat.innerText=Math.floor(Math.random()*100);

}

},60);

}


// STOP

function stop(){

clearInterval(interval);

let shuffled=[...students];

for(let i=shuffled.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));
[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];

}

for(let i=0;i<seats.length;i++){

seats[i].innerText=shuffled[i];

}

}

</script>

</body>
</html>
